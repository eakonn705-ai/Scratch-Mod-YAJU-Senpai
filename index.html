<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Night-Mod Player</title>
    <script src="https://cdn.jsdelivr.net/npm/scratch-vm/dist/web/scratch-vm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/scratch-render/dist/web/scratch-render.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/scratch-storage/dist/web/scratch-storage.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/scratch-svg-renderer/dist/web/scratch-svg-renderer.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        window.global = window;
        window.process = { env: { NODE_ENV: 'production' } };
        window.Buffer = window.Buffer || { isBuffer: () => false };
    </script>

    <style>
        /* 全体のレイアウト設定 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', 'Avenir', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* 添付された夜景画像を設定 */
            background-image: url('night-mod.png.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* 背景を少し暗くしてUIを際立たせる */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.6));
            z-index: -1;
        }

        #app-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
            z-index: 1;
        }

        /* タイトルのデザイン：ネオン風の光彩 */
        .mod-title {
            font-size: 3rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-shadow: 
                0 0 10px rgba(0, 212, 255, 0.8),
                0 0 20px rgba(0, 212, 255, 0.5),
                0 0 30px rgba(0, 212, 255, 0.3);
            margin-bottom: 1rem;
            font-style: italic;
        }

        #canvas-container {
            width: 480px;
            height: 360px;
            background-color: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* コントロールパネル：ダークで半透明なデザイン */
        .controls-panel {
            background: rgba(15, 15, 25, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 0 0 16px 16px;
            padding: 16px;
            width: 480px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Scratch風バー：ダークモード */
        .scratch-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(25, 25, 35, 0.9);
            padding: 8px 16px;
            border-radius: 16px 16px 0 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: none;
            width: 480px;
        }

        .icon-btn {
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.1));
        }

        .icon-btn:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.4));
        }

        /* スライダーのカスタマイズ */
        input[type="range"] {
            accent-color: #00d4ff;
            background: rgba(255, 255, 255, 0.1);
        }
        
        #status-bar {
            color: #00d4ff;
            text-shadow: 0 0 5px rgba(0, 212, 255, 0.5);
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div id="app-wrapper">
        <header class="text-center">
            <h1 class="mod-title">Night-Mod</h1>
        </header>

        <!-- Scratch UI Bar -->
        <div class="scratch-bar">
            <!-- 緑の旗 -->
            <button id="green-flag" class="icon-btn" title="実行">
                <svg width="28" height="28" viewBox="0 0 32 32">
                    <path fill="#00ff88" d="M6 4v24l20-12L6 4z"/>
                </svg>
            </button>
            <!-- 八角形の赤ボタン -->
            <button id="stop-all" class="icon-btn" title="停止">
                <svg width="28" height="28" viewBox="0 0 32 32">
                    <path fill="#ff3366" d="M10 4h12l6 6v12l-6 6H10l-6-6V10l6-6z"/>
                </svg>
            </button>
            <div id="status-bar" class="ml-auto text-[10px] font-bold tracking-widest uppercase">
                System Ready
            </div>
        </div>

        <div id="canvas-container">
            <canvas id="stage-canvas"></canvas>
        </div>

        <div class="controls-panel">
            <!-- ファイル選択 -->
            <div class="flex items-center gap-4">
                <input type="file" id="file-input" accept=".sb3" 
                    class="block w-full text-xs text-blue-300 file:mr-4 file:py-1.5 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-bold file:bg-blue-900/50 file:text-blue-300 hover:file:bg-blue-800/50 transition cursor-pointer"/>
            </div>

            <!-- FPS Slider -->
            <div class="border-t border-white/10 pt-3">
                <div class="flex items-center justify-between mb-2">
                    <label for="fps-slider" class="text-[10px] font-bold text-blue-300 tracking-wider uppercase">Clock Speed: <span id="fps-value" class="text-white ml-1">30</span> FPS</label>
                    <span class="text-[9px] text-gray-500 font-bold uppercase tracking-tighter">Engine overclocking</span>
                </div>
                <input type="range" id="fps-slider" min="30" max="120" value="30" step="1" 
                    class="w-full h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer">
            </div>
        </div>
    </div>

    <script>
        // 基本設定
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target === document.body) {
                e.preventDefault();
            }
        }, false);

        let retryCount = 0;
        const maxRetries = 30;

        const getConstructor = (lib) => {
            if (typeof lib === 'function') return lib;
            if (lib && typeof lib.default === 'function') return lib.default;
            if (lib && typeof lib === 'object') {
                for (const key in lib) {
                    if (typeof lib[key] === 'function' && key.toLowerCase().includes('storage')) {
                        return lib[key];
                    }
                }
            }
            return null;
        };

        const initScratchPlayer = () => {
            const canvas = document.getElementById('stage-canvas');
            const fileInput = document.getElementById('file-input');
            const greenFlagBtn = document.getElementById('green-flag');
            const stopBtn = document.getElementById('stop-all');
            const statusBar = document.getElementById('status-bar');
            const fpsSlider = document.getElementById('fps-slider');
            const fpsValueDisplay = document.getElementById('fps-value');

            const rawVM = window.VirtualMachine;
            const rawRenderer = window.ScratchRender;
            const rawStorage = window.ScratchStorage;

            const ActualVM = getConstructor(rawVM);
            const ActualRenderer = getConstructor(rawRenderer);
            const ActualStorage = getConstructor(rawStorage);

            if (!ActualVM || !ActualRenderer || !ActualStorage) {
                if (retryCount < maxRetries) {
                    retryCount++;
                    statusBar.textContent = `SYNCING... (${retryCount})`;
                    setTimeout(initScratchPlayer, 300);
                    return;
                }
                statusBar.textContent = "SYSTEM_FAILURE";
                return;
            }

            statusBar.textContent = "SYSTEM ONLINE";

            try {
                const vm = new ActualVM();
                const renderer = new ActualRenderer(canvas);
                const storage = new ActualStorage();

                vm.attachRenderer(renderer);
                vm.attachStorage(storage);

                let targetFPS = 30;
                let lastStepTime = performance.now();

                const customStep = () => {
                    const now = performance.now();
                    const interval = 1000 / targetFPS;
                    const elapsed = now - lastStepTime;

                    if (elapsed >= interval) {
                        vm.runtime._step();
                        lastStepTime = now - (elapsed % interval);
                    }
                    requestAnimationFrame(customStep);
                };

                const updateFPS = (fps) => {
                    targetFPS = fps;
                    fpsValueDisplay.textContent = fps;
                    if (typeof vm.setRuntimeOptions === 'function') {
                        vm.setRuntimeOptions({ frameRate: fps });
                    }
                    vm.runtime.frameLoopTimeout = 1000 / fps;
                };

                fpsSlider.addEventListener('input', (e) => {
                    updateFPS(parseInt(e.target.value));
                });

                const getMousePos = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    return {
                        x: (e.clientX - rect.left) / rect.width * 480 - 240,
                        y: 180 - (e.clientY - rect.top) / rect.height * 360
                    };
                };

                canvas.addEventListener('mousemove', (e) => {
                    const pos = getMousePos(e);
                    vm.postIOData('mouse', { x: pos.x, y: pos.y, isDown: undefined });
                });

                canvas.addEventListener('mousedown', (e) => {
                    const pos = getMousePos(e);
                    vm.postIOData('mouse', { x: pos.x, y: pos.y, isDown: true });
                });

                window.addEventListener('mouseup', () => {
                    vm.postIOData('mouse', { isDown: false });
                });

                window.addEventListener('keydown', (e) => {
                    vm.postIOData('keyboard', { key: e.key, isDown: true });
                    if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) {
                        e.preventDefault();
                    }
                });

                window.addEventListener('keyup', (e) => {
                    vm.postIOData('keyboard', { key: e.key, isDown: false });
                });

                vm.start();
                if (vm.runtime._steppingInterval) {
                    clearInterval(vm.runtime._steppingInterval);
                }
                requestAnimationFrame(customStep);
                
                updateFPS(30);

                fileInput.addEventListener('change', async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;

                    statusBar.textContent = "UPLOADING...";
                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        try {
                            await vm.loadProject(event.target.result);
                            statusBar.textContent = "CORE_ACTIVE";
                            vm.greenFlag();
                        } catch (err) {
                            statusBar.textContent = "CRITICAL_ERROR";
                            console.error(err);
                        }
                    };
                    reader.readAsArrayBuffer(file);
                });

                greenFlagBtn.addEventListener('click', () => vm.greenFlag());
                stopBtn.addEventListener('click', () => vm.stopAll());

                const draw = () => {
                    renderer.draw();
                    requestAnimationFrame(draw);
                };
                draw();
                
            } catch (initErr) {
                statusBar.textContent = "INIT_ERROR";
                console.error(initErr);
            }
        };

        initScratchPlayer();
    </script>
</body>
</html>
